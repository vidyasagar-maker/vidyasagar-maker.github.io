<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidya AI Premium — v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-primary:#0a0e27;
  --bg-secondary:#111633;
  --bg-tertiary:#16213e;
  --surface:#1a2847;
  --surface-light:#22345a;
  --border:#2a3f5f;
  --border-light:#3d5a87;
  --accent-primary:#6366f1;
  --accent-secondary:#a78bfa;
  --accent-tertiary:#22c55e;
  --accent-warm:#f97316;
  --text-primary:#f8fafc;
  --text-secondary:#cbd5e1;
  --text-muted:#64748b;
  --text-faint:#475569;
  --glow-primary:rgba(99,102,241,0.15);
  --glow-warm:rgba(249,115,22,0.12);
  --danger:#ef4444;
  --success:#22c55e;
  --radius-sm:8px;
  --radius-md:12px;
  --radius-lg:16px;
  --radius-xl:20px;
  --transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  --transition-fast:all 0.2s cubic-bezier(0.4,0,0.2,1);
}

*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  z-index:0;
  background:
    radial-gradient(circle at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(249,115,22,0.06) 0%, transparent 50%),
    radial-gradient(circle at 40% 0%, rgba(34,197,94,0.04) 0%, transparent 50%);
  pointer-events:none;
}

nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:200;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 48px;
  background:rgba(10,14,39,0.7);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.logo{
  font-family:'Playfair Display',serif;
  font-weight:900;
  font-size:1.6rem;
  letter-spacing:-1px;
  background:linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  text-decoration:none;
  display:flex;
  align-items:baseline;
  gap:8px;
}

.logo .ver{
  font-family:'Inter',sans-serif;
  font-size:0.7rem;
  font-weight:700;
  color:var(--text-muted);
  -webkit-text-fill-color:var(--text-muted);
  background:rgba(99,102,241,0.12);
  padding:2px 8px;
  border-radius:100px;
  letter-spacing:0.5px;
}

.nav-r{
  display:flex;
  gap:14px;
  align-items:center;
}

.nbtn{
  padding:10px 24px;
  border-radius:var(--radius-lg);
  font-family:'Inter',sans-serif;
  font-size:0.9rem;
  font-weight:600;
  cursor:pointer;
  border:none;
  transition:var(--transition);
  letter-spacing:0.5px;
}

.nbtn.primary{
  background:linear-gradient(135deg, var(--accent-primary) 0%, #7c3aed 100%);
  color:#fff;
  box-shadow:0 8px 24px rgba(99,102,241,0.35);
}

.nbtn.primary:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(99,102,241,0.45);
}

#app{
  display:grid;
  grid-template-columns:300px 1fr;
  height:100vh;
}

.sidebar{
  background:rgba(17,22,51,0.8);
  border-right:1.5px solid var(--border);
  display:flex;
  flex-direction:column;
  padding:80px 0 0;
  overflow:hidden;
}

.sidebar-top{
  padding:24px 24px 20px;
  border-bottom:1.5px solid var(--border);
  background:rgba(10,14,39,0.5);
  backdrop-filter:blur(10px);
}

.sidebar-logo{
  font-family:'Playfair Display',serif;
  font-weight:900;
  font-size:1.4rem;
  background:linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:16px;
  letter-spacing:-0.5px;
}

.new-chat-btn{
  width:100%;
  padding:12px;
  border-radius:var(--radius-lg);
  background:linear-gradient(135deg, var(--accent-primary), #7c3aed);
  border:none;
  color:#fff;
  font-family:'Inter',sans-serif;
  font-size:0.9rem;
  font-weight:700;
  cursor:pointer;
  transition:var(--transition-fast);
  letter-spacing:0.5px;
}

.new-chat-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(99,102,241,0.35);
}

.s-section{
  padding:18px 24px 10px;
  font-size:0.75rem;
  font-weight:700;
  color:var(--text-muted);
  letter-spacing:2px;
  text-transform:uppercase;
}

.chat-list{
  flex:1;
  overflow-y:auto;
  padding:0 12px;
}

.chat-list::-webkit-scrollbar{
  width:6px;
}

.chat-list::-webkit-scrollbar-track{
  background:transparent;
}

.chat-list::-webkit-scrollbar-thumb{
  background:rgba(99,102,241,0.2);
  border-radius:3px;
}

.chat-item{
  padding:12px 14px;
  border-radius:var(--radius-lg);
  cursor:pointer;
  font-size:0.9rem;
  color:var(--text-secondary);
  transition:var(--transition-fast);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-bottom:6px;
}

.chat-item:hover, .chat-item.active{
  background:rgba(99,102,241,0.15);
  color:var(--text-primary);
}

.sidebar-bottom{
  padding:18px 24px;
  border-top:1.5px solid var(--border);
  font-size:0.78rem;
  color:var(--text-muted);
  text-align:center;
}

.chat-main{
  display:flex;
  flex-direction:column;
  height:100vh;
  padding-top:80px;
  background:linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
}

.model-bar{
  padding:14px 40px 12px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1.5px solid var(--border);
  background:rgba(10,14,39,0.5);
}

.model-chip{
  padding:7px 16px;
  border-radius:100px;
  border:1.5px solid var(--border);
  background:transparent;
  font-size:0.8rem;
  color:var(--accent-primary);
  font-weight:700;
  letter-spacing:0.3px;
  box-shadow:0 0 12px rgba(99,102,241,0.2);
}

.empty-state{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:60px 40px;
}

.es-logo{
  font-size:4.5rem;
  margin-bottom:24px;
  animation:float 6s ease-in-out infinite;
}

.es-title{
  font-family:'Playfair Display',serif;
  font-size:2rem;
  font-weight:900;
  margin-bottom:12px;
  background:linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.es-sub{
  color:var(--text-secondary);
  font-size:1rem;
  line-height:1.7;
  max-width:420px;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  justify-content:center;
  margin-top:36px;
}

.chip{
  padding:11px 20px;
  border-radius:100px;
  border:1.5px solid var(--border);
  background:rgba(26,40,71,0.4);
  font-size:0.85rem;
  color:var(--text-secondary);
  cursor:pointer;
  transition:var(--transition);
  font-weight:600;
}

.chip:hover{
  border-color:var(--accent-primary);
  color:var(--accent-primary);
  background:rgba(99,102,241,0.12);
  transform:translateY(-2px);
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:32px 48px;
  display:flex;
  flex-direction:column;
  gap:24px;
}

.messages::-webkit-scrollbar{
  width:6px;
}

.messages::-webkit-scrollbar-thumb{
  background:rgba(99,102,241,0.2);
  border-radius:3px;
}

.msg{
  display:flex;
  gap:14px;
  max-width:900px;
  animation:msgSlide 0.4s ease;
}

@keyframes msgSlide{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes float{
  0%, 100%{transform:translateY(0px);}
  50%{transform:translateY(-40px);}
}

.msg.user{
  flex-direction:row-reverse;
  align-self:flex-end;
}

.msg-av{
  width:38px;
  height:38px;
  border-radius:50%;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1rem;
}

.msg-av.ai{
  background:linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  box-shadow:0 4px 12px rgba(99,102,241,0.3);
}

.msg-av.usr{
  background:linear-gradient(135deg, var(--accent-tertiary), #059669);
  color:#fff;
  font-weight:700;
}

.bubble{
  padding:16px 20px;
  border-radius:var(--radius-lg);
  font-size:0.95rem;
  line-height:1.8;
  max-width:720px;
  word-wrap:break-word;
  white-space:pre-wrap;
}

.msg.ai .bubble{
  background:rgba(26,40,71,0.6);
  border:1.5px solid var(--border);
}

.msg.user .bubble{
  background:linear-gradient(135deg, var(--accent-primary), #7c3aed);
  color:#fff;
  box-shadow:0 8px 20px rgba(99,102,241,0.3);
}

.bubble .cursor{
  display:inline-block;
  width:2px;
  height:1em;
  background:var(--accent-secondary);
  margin-left:2px;
  vertical-align:middle;
  animation:blink 0.9s step-start infinite;
}

.bubble p{margin:0 0 10px;}
.bubble p:last-child{margin-bottom:0;}
.bubble strong{color:var(--text-primary);font-weight:700;}
.bubble em{font-style:italic;}
.bubble code.inline-code{
  background:rgba(99,102,241,0.15);
  border:1px solid rgba(99,102,241,0.25);
  padding:2px 6px;
  border-radius:5px;
  font-family:'Consolas','Menlo',monospace;
  font-size:0.85em;
  color:var(--accent-secondary);
}

.code-block{
  margin:10px 0;
  border-radius:var(--radius-md);
  overflow:hidden;
  border:1.5px solid var(--border);
  background:#0d1226;
}

.code-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 14px;
  background:rgba(99,102,241,0.1);
  border-bottom:1px solid var(--border);
  font-family:'Inter',sans-serif;
  font-size:0.75rem;
  color:var(--text-muted);
  letter-spacing:0.5px;
  text-transform:uppercase;
  font-weight:700;
}

.code-copy-btn{
  background:none;
  border:1px solid var(--border);
  color:var(--text-secondary);
  font-family:'Inter',sans-serif;
  font-size:0.72rem;
  font-weight:600;
  padding:4px 10px;
  border-radius:6px;
  cursor:pointer;
  transition:var(--transition-fast);
  text-transform:none;
  letter-spacing:0;
}

.code-copy-btn:hover{
  border-color:var(--accent-primary);
  color:var(--accent-primary);
}

.code-block pre{
  margin:0;
  padding:14px 16px;
  overflow-x:auto;
}

.code-block code{
  font-family:'Consolas','Menlo',monospace;
  font-size:0.85rem;
  line-height:1.6;
  color:#c9d6f5;
  white-space:pre;
}

@keyframes blink{
  50%{opacity:0;}
}

.typing-dots{
  display:flex;
  gap:6px;
  align-items:center;
}

.typing-dots span{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent-primary);
  animation:typingDots 1.4s infinite;
}

.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}

@keyframes typingDots{
  0%, 60%, 100%{opacity:0.3;}
  30%{opacity:1;}
}

.input-area{
  padding:20px 48px 32px;
  border-top:1.5px solid var(--border);
  background:rgba(10,14,39,0.5);
}

.input-wrap{
  display:flex;
  gap:12px;
  align-items:flex-end;
  background:rgba(26,40,71,0.6);
  border:1.5px solid var(--border);
  border-radius:var(--radius-lg);
  padding:12px 14px;
  transition:var(--transition-fast);
}

.input-wrap:focus-within{
  border-color:var(--accent-primary);
  background:rgba(26,40,71,0.8);
  box-shadow:0 0 0 4px rgba(99,102,241,0.1);
}

#chatInput{
  flex:1;
  background:none;
  border:none;
  color:var(--text-primary);
  font-family:'Inter',sans-serif;
  font-size:0.95rem;
  resize:none;
  outline:none;
  max-height:140px;
  line-height:1.6;
}

#chatInput::placeholder{
  color:var(--text-muted);
}

.send-btn{
  width:40px;
  height:40px;
  border-radius:var(--radius-lg);
  flex-shrink:0;
  background:linear-gradient(135deg, var(--accent-primary), #7c3aed);
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:1.1rem;
  box-shadow:0 4px 12px rgba(99,102,241,0.25);
  font-weight:700;
  transition:var(--transition);
}

.send-btn:hover:not(:disabled){
  transform:scale(1.08);
  box-shadow:0 8px 20px rgba(99,102,241,0.4);
}

.send-btn:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

.input-hint{
  font-size:0.78rem;
  color:var(--text-muted);
  margin-top:8px;
  text-align:center;
}

.toast{
  position:fixed;
  bottom:32px;
  right:32px;
  z-index:9999;
  padding:14px 24px;
  border-radius:var(--radius-lg);
  background:rgba(26,40,71,0.9);
  backdrop-filter:blur(10px);
  border:1.5px solid var(--border);
  color:var(--text-primary);
  font-size:0.9rem;
  font-weight:600;
  transform:translateY(120px);
  opacity:0;
  transition:all 0.4s;
  max-width:300px;
}

.toast.show{
  transform:translateY(0);
  opacity:1;
}

@media(max-width:768px){
  #app{
    grid-template-columns:1fr;
  }
  .sidebar{
    display:none;
  }
  nav{padding:14px 20px;}
  .messages{padding:16px 20px;}
  .input-area{padding:14px 20px 20px;}
}
</style>
</head>
<body>

<nav>
  <div class="logo">VidyaAI <span class="ver">v2.0</span></div>
  <div class="nav-r"></div>
</nav>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo">VidyaAI</div>
      <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    </div>
    <div class="s-section">Recent Chats</div>
    <div class="chat-list" id="chatList"><div style="font-size:0.8rem;color:var(--text-muted);padding:12px;">No chats yet</div></div>
    <div class="sidebar-bottom">Vidya AI Premium · v2.0</div>
  </div>

  <div class="chat-main">
    <div class="model-bar">
      <span class="model-chip">✨ Vidya AI Assistant</span>
    </div>

    <div id="emptyDiv" class="empty-state">
      <div class="es-logo">💬</div>
      <div class="es-title">Vidya AI Premium</div>
      <p class="es-sub">Kuch bhi poochho, kisi bhi language mein!</p>
      <div class="chips">
        <div class="chip" onclick="quickMsg('Mujhe Python mein hello world likhke do')">💻 Python code</div>
        <div class="chip" onclick="quickMsg('Ek creative story shuruaat do')">✨ Story</div>
        <div class="chip" onclick="quickMsg('Machine learning kya hota hai?')">🧠 ML explain</div>
        <div class="chip" onclick="quickMsg('Hindi mein ek joke bata')">😂 Joke</div>
      </div>
    </div>

    <div id="msgsDiv" class="messages" style="display:none;"></div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="chatInput" placeholder="Kuch bhi likho..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
      </div>
      <div class="input-hint">Enter = send · Shift+Enter = new line</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="tmsg"></span></div>

<script>
let msgs=[];
let chatHist=[];
const API_URL='https://play-z-ai.crunchfun885.workers.dev/?prompt=';

function newChat(){
  msgs=[];
  document.getElementById('emptyDiv').style.display='flex';
  document.getElementById('msgsDiv').style.display='none';
  document.getElementById('msgsDiv').innerHTML='';
}

function updateHistory(){
  const el=document.getElementById('chatList');
  if(chatHist.length===0){
    el.innerHTML='<div style="font-size:0.8rem;color:var(--text-muted);padding:12px;">No chats yet</div>';
  }else{
    el.innerHTML=chatHist.map((c,i)=>`<div class="chat-item${i===0?' active':''}" onclick="loadChat(${i})">${c.title}</div>`).join('');
  }
}

function loadChat(i){
  msgs=[...chatHist[i].msgs];
  document.getElementById('emptyDiv').style.display='none';
  const md=document.getElementById('msgsDiv');
  md.style.display='flex';
  md.innerHTML='';
  msgs.forEach(m=>appendBubble(m.role,m.content,false));
  md.scrollTop=md.scrollHeight;
}

function quickMsg(t){
  document.getElementById('chatInput').value=t;
  sendMsg();
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    sendMsg();
  }
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,140)+'px';
}

async function sendMsg(){
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();

  if(!text||text.length>5000){
    if(text.length>5000)toast('❌ Message too long','err');
    return;
  }

  inp.value='';
  inp.style.height='auto';
  document.getElementById('emptyDiv').style.display='none';
  const md=document.getElementById('msgsDiv');
  md.style.display='flex';

  msgs.push({role:'user',content:text});
  appendBubble('user',text,false);

  const tid='t'+Date.now();
  md.innerHTML+=`<div class="msg ai" id="${tid}"><div class="msg-av ai">🤖</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  md.scrollTop=md.scrollHeight;
  document.getElementById('sendBtn').disabled=true;

  try{
    const reply=await callAPI(text);
    const tEl=document.getElementById(tid);
    if(tEl){
      tEl.querySelector('.bubble').innerHTML='';
      await typeOutLines(tEl.querySelector('.bubble'),reply);
      tEl.removeAttribute('id');
    }
    msgs.push({role:'assistant',content:reply});

    const title=text.slice(0,38)+(text.length>38?'…':'');
    chatHist.unshift({title,msgs:[...msgs]});
    if(chatHist.length>20)chatHist.pop();
    updateHistory();
  }catch(err){
    document.getElementById(tid)?.remove();
    appendBubble('ai','❌ Error: '+err.message,false);
  }

  document.getElementById('sendBtn').disabled=false;
  md.scrollTop=md.scrollHeight;
}

async function callAPI(prompt){
  const url=API_URL+encodeURIComponent(prompt);

  const response=await fetch(url);
  if(!response.ok){
    throw new Error('API Error: '+response.status);
  }

  const data=await response.text();
  return data||'(No response)';
}

function escapeHtml(text){
  return text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

// Applies simple inline markdown formatting (bold, italic, inline code) to a single line
function formatInline(line){
  let s=escapeHtml(line);
  s=s.replace(/`([^`]+)`/g,'<code class="inline-code">$1</code>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>');
  return s;
}

// Splits AI text into alternating plain-text and fenced-code segments
function parseSegments(text){
  const segments=[];
  const re=/```(\w*)\n?([\s\S]*?)```/g;
  let last=0,match;
  while((match=re.exec(text))!==null){
    if(match.index>last){
      segments.push({type:'text',content:text.slice(last,match.index)});
    }
    segments.push({type:'code',lang:match[1]||'text',content:match[2].replace(/\n$/,'')});
    last=re.lastIndex;
  }
  if(last<text.length){
    segments.push({type:'text',content:text.slice(last)});
  }
  return segments;
}

function sleep(ms){
  return new Promise(res=>setTimeout(res,ms));
}

let copyCounter=0;
function copyCode(id){
  const el=document.getElementById(id);
  if(!el)return;
  navigator.clipboard.writeText(el.textContent).then(()=>toast('✅ Code copied'));
}

// Streams the AI reply into the bubble: types plain-text lines, and code blocks
// are typed inside a styled, monospace, copyable code panel.
async function typeOutLines(bubbleEl,text){
  const md=document.getElementById('msgsDiv');
  const segments=parseSegments(text);
  const cursor=document.createElement('span');
  cursor.className='cursor';

  for(const seg of segments){
    if(seg.type==='code'){
      copyCounter++;
      const codeId='code'+Date.now()+copyCounter;
      const block=document.createElement('div');
      block.className='code-block';
      block.innerHTML=`<div class="code-header"><span>${escapeHtml(seg.lang)}</span><button class="code-copy-btn" onclick="copyCode('${codeId}')">Copy</button></div><pre><code id="${codeId}"></code></pre>`;
      bubbleEl.appendChild(block);
      const codeEl=block.querySelector('code');
      const lines=seg.content.split('\n');
      for(let i=0;i<lines.length;i++){
        const lineText=(i===0?'':'\n')+lines[i];
        codeEl.appendChild(cursor);
        let shown='';
        for(const ch of lineText){
          shown+=ch;
          cursor.insertAdjacentText('beforebegin',ch);
          md.scrollTop=md.scrollHeight;
          await sleep(6);
        }
        await sleep(20);
      }
      await sleep(80);
    }else{
      const lines=seg.content.split('\n').filter((l,i,arr)=>!(l.trim()===''&&(i===0||i===arr.length-1)));
      for(const line of lines){
        if(line.trim()===''){continue;}
        const lineDiv=document.createElement('p');
        bubbleEl.appendChild(lineDiv);
        bubbleEl.appendChild(cursor);
        let shown='';
        for(const ch of line){
          shown+=ch;
          lineDiv.innerHTML=formatInline(shown);
          md.scrollTop=md.scrollHeight;
          await sleep(12);
        }
        await sleep(80);
      }
    }
  }
  cursor.remove();
}

function appendBubble(role,text,animate){
  const md=document.getElementById('msgsDiv');
  const isAI=role==='ai'||role==='assistant';
  const av=isAI?'🤖':'U';
  const avC=isAI?'ai':'usr';

  const div=document.createElement('div');
  div.className='msg '+(isAI?'ai':'user');
  const bubble=document.createElement('div');
  bubble.className='bubble';

  if(isAI){
    const segments=parseSegments(text);
    let html='';
    for(const seg of segments){
      if(seg.type==='code'){
        copyCounter++;
        const codeId='code'+Date.now()+copyCounter;
        html+=`<div class="code-block"><div class="code-header"><span>${escapeHtml(seg.lang)}</span><button class="code-copy-btn" onclick="copyCode('${codeId}')">Copy</button></div><pre><code id="${codeId}">${escapeHtml(seg.content)}</code></pre></div>`;
      }else{
        const lines=seg.content.split('\n').filter(l=>l.trim()!=='');
        for(const line of lines){
          html+=`<p>${formatInline(line)}</p>`;
        }
      }
    }
    bubble.innerHTML=html;
  }else{
    bubble.innerHTML=`<p>${formatInline(text)}</p>`;
  }

  div.innerHTML=`<div class="msg-av ${avC}">${av}</div>`;
  div.appendChild(bubble);
  md.appendChild(div);
  md.scrollTop=md.scrollHeight;
}

function toast(msg,type=''){
  const t=document.getElementById('toast');
  const tm=document.getElementById('tmsg');
  tm.textContent=msg;
  t.className='toast'+(type?' '+type:'');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}
</script>
